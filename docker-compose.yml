services:
  mongo:
    image: mongo:7
    container_name: secure-blog-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - blog-network

  backend:
    build: ./backend
    container_name: secure-blog-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/secure-blog
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    depends_on:
      - mongo
    volumes:
      - uploads:/app/src/public/uploads
    networks:
      - blog-network

  frontend:
    build: ./frontend
    container_name: secure-blog-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - blog-network

volumes:
  mongo_data:
  uploads:

networks:
  blog-network:
    driver: bridge
